<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Background circle -->
  <circle cx="32" cy="32" r="30" fill="url(#gradient1)"/>

  <!-- Thread spool base -->
  <ellipse cx="32" cy="44" rx="16" ry="5" fill="#1a365d" opacity="0.3"/>

  <!-- Yarn spool body -->
  <rect x="20" y="20" width="24" height="24" rx="3" fill="url(#gradient2)"/>

  <!-- Thread wrapping lines -->
  <path d="M22 24 Q32 22 42 24" stroke="#fff" stroke-width="1.5" fill="none" opacity="0.6"/>
  <path d="M22 28 Q32 26 42 28" stroke="#fff" stroke-width="1.5" fill="none" opacity="0.7"/>
  <path d="M22 32 Q32 30 42 32" stroke="#fff" stroke-width="1.5" fill="none" opacity="0.8"/>
  <path d="M22 36 Q32 34 42 36" stroke="#fff" stroke-width="1.5" fill="none" opacity="0.7"/>
  <path d="M22 40 Q32 38 42 40" stroke="#fff" stroke-width="1.5" fill="none" opacity="0.6"/>

  <!-- Thread coming out -->
  <path d="M42 28 Q50 24 52 16 Q54 10 48 8" stroke="#ffd93d" stroke-width="2.5" stroke-linecap="round" fill="none"/>

  <!-- Shine effect -->
  <ellipse cx="26" cy="26" rx="3" ry="2" fill="#fff" opacity="0.4"/>

  <!-- Gradients -->
  <defs>
    <linearGradient id="gradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
    <linearGradient id="gradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4facfe"/>
      <stop offset="100%" style="stop-color:#00f2fe"/>
    </linearGradient>
  </defs>
</svg>
